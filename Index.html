<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Smart 3D Multi-Map</title>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.0/maptiler-sdk.umd.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.0/maptiler-sdk.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        /* මැද තියෙන පින් එක (Address select mode එකට විතරයි) */
        .center-pin {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -100%); z-index: 10;
            width: 40px; display: none; pointer-events: none;
        }
    </style>
</head>
<body>

<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" class="center-pin" id="mainPin">
<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const mtKey = 'ZJ9mIZcn83yKTn3Zn7Xd';
const supabaseUrl = "https://dnigrhbebdlwiicjnxnf.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // ඔයාගේ key එක පාවිච්චි කරන්න
const client = supabase.createClient(supabaseUrl, supabaseKey);

const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get("mode"); // 'select', 'rider', 'customer'
const sessionId = urlParams.get("session");

const map = new maptilersdk.Map({
    container: 'map',
    style: maptilersdk.MapStyle.SATELLITE,
    apiKey: mtKey,
    center: [80.7718, 7.8731],
    zoom: 14,
    pitch: 65,
    terrain: true
});

let carMarker;
const carEl = document.createElement('img');
carEl.src = "https://cdn-icons-png.flaticon.com/512/744/744465.png";
carEl.style.width = "40px";

// --- MODE 1: ADDRESS SELECTION ---
if (mode === 'select') {
    document.getElementById('mainPin').style.display = 'block';
    map.on('moveend', async () => {
        const c = map.getCenter();
        const res = await fetch(`https://api.maptiler.com/geocoding/${c.lng},${c.lat}.json?key=${mtKey}`);
        const data = await res.json();
        if (data.features.length > 0) {
            window.parent.postMessage({ 'address': data.features[0].place_name, 'lat': c.lat, 'lng': c.lng }, "*");
        }
    });
}

// --- MODE 2 & 3: LIVE TRACKING (Rider & Customer) ---
if (mode === 'rider' || mode === 'customer') {
    async function track() {
        if (!sessionId) return;
        const { data } = await client.from("locations").select("*").eq("session_id", sessionId).order("created_at", { ascending: false }).limit(1);
        
        if (data && data.length > 0) {
            const loc = data[0];
            if (!carMarker) {
                carMarker = new maptilersdk.Marker({element: carEl}).setLngLat([loc.longitude, loc.latitude]).addTo(map);
                map.flyTo({ center: [loc.longitude, loc.latitude], zoom: 17 });
            } else {
                carMarker.setLngLat([loc.longitude, loc.latitude]);
                carEl.style.transform = `rotate(${loc.heading || 0}deg)`; // වාහනය හරවන්න
                map.easeTo({ center: [loc.longitude, loc.latitude], bearing: loc.heading || 0, duration: 1000 });
            }
        }
    }
    setInterval(track, 3000);
}

// FlutterFlow එකෙන් මැප් එක කොහෙට හරි ගෙනියන්න කිව්වොත් (Search වලදී)
window.addEventListener("message", (e) => {
    if (e.data.type === 'move') {
        map.flyTo({ center: [e.data.lng, e.data.lat], zoom: 16 });
    }
});
</script>
</body>
</html>
